{% for project in projects %}

<h3>{{ project.title }}</h3>
<p>{{ project.description }}</p>

<a href="{{ project.github_link }}" target="_blank">GitHub</a>
<a href="{{ project.live_link }}" target="_blank">Live Demo</a>
<a class="btn" href="{{ project.github_link }}" target="_blank">GitHub</a>
<a class="btn" href="{{ project.live_link }}" target="_blank">Live Demo</a>
<hr>

{% endfor %}
