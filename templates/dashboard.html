{% extends "base.html" %}

{% block content %}

<h1>Dashboard</h1>

<div class="card">
    <h2>Total Students</h2>
    <p>{{ total_students }}</p>
</div>

<div class="card">
    <h2>Total Tasks</h2>
    <p>{{ total_tasks }}</p>
</div>

<hr>

<a href="/add_project">
    <button>Add Project</button>
</a>

<h2>Your Tasks</h2>

<ul>
{% for task in tasks %}
<li>{{ task.title }}</li>
{% endfor %}
</ul>

{% endblock %}
